<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EventSense | Buy Tickets</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --crimson: #8b0000;
  --crimson-light: #a00000;
  --crimson-dim: rgba(139,0,0,0.15);
  --bg: #05080f;
  --card: #0c1018;
  --card2: #111827;
  --border: rgba(255,255,255,0.07);
  --border-red: rgba(139,0,0,0.35);
  --text: #f0ede8;
  --text-muted: #6a7a8a;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-top: 80px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 5% 0%, rgba(139,0,0,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 95% 100%, rgba(139,0,0,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed; top: 0; width: 100%;
  padding: 18px 40px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(14px);
  z-index: 1000; border-bottom: 1px solid rgba(139,0,0,0.2);
}
.nav-brand { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--text); }
.nav-brand span { color: var(--crimson); }
.nav-links { display: flex; align-items: center; gap: 8px; }
.nav-links a {
  color: #ccc; text-decoration: none; font-size: 0.88rem; font-weight: 500;
  padding: 7px 14px; border-radius: 3px; transition: all 0.2s;
}
.nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.search-box {
  position: relative;
}
.search-box input {
  width: 260px; padding: 9px 16px 9px 38px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border-red);
  border-radius: 3px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--crimson); }
.search-box::before {
  content: '⌕'; position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; pointer-events: none;
}

/* ===== HERO ===== */
.hero {
  text-align: center; padding: 3.5rem 2rem 2.5rem;
  position: relative; z-index: 1;
}
.hero-eyebrow {
  font-size: 0.68rem; letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--crimson); margin-bottom: 10px;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 400; line-height: 1.05; margin-bottom: 10px;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-sub { font-size: 0.9rem; color: var(--text-muted); }

/* ===== LAYOUT ===== */
.page-wrap {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 2px;
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
  position: relative; z-index: 1;
  align-items: start;
}

/* ===== EVENT LIST ===== */
.events-col {}
.events-list { display: flex; flex-direction: column; gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

/* EVENT TICKET ROW */
.event-row {
  background: var(--card);
  display: flex; align-items: stretch;
  transition: background 0.2s;
  position: relative; overflow: hidden;
  cursor: pointer;
  animation: fadeUp 0.4s ease both;
}
.event-row:hover { background: #0f1825; }

/* left crimson bar */
.event-row::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--crimson); transform: scaleY(0); transform-origin: bottom; transition: transform 0.25s;
}
.event-row:hover::before { transform: scaleY(1); }

/* IMAGE */
.ev-img {
  width: 130px; flex-shrink: 0;
  overflow: hidden; position: relative;
}
.ev-img img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; opacity: 0.85; transition: transform 0.4s, opacity 0.3s;
}
.event-row:hover .ev-img img { transform: scale(1.06); opacity: 1; }
.ev-img .no-img {
  width: 100%; height: 100%; min-height: 130px;
  background: linear-gradient(135deg, var(--card2), #0a0f1a);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; opacity: 0.3;
}

/* PERFORATION DIVIDER */
.perf {
  width: 1px; flex-shrink: 0; align-self: stretch;
  background: repeating-linear-gradient(
    to bottom,
    var(--crimson) 0px, var(--crimson) 5px,
    transparent 5px, transparent 10px
  );
  margin: 0 16px;
  opacity: 0.5;
}

/* EVENT INFO */
.ev-info {
  flex: 1; padding: 1.1rem 0.5rem 1.1rem 0;
  display: flex; flex-direction: column; justify-content: center;
}
.ev-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-weight: 400; margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px;
}
.ev-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 8px; }
.ev-chip { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.ev-chip .ic { font-size: 0.8rem; }
.ev-tag {
  display: inline-block; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 2px;
  background: var(--crimson-dim); color: #e06060; border: 1px solid var(--border-red);
}

/* PRICE + ADD */
.ev-right {
  padding: 1.1rem 1.2rem; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 10px;
}
.ev-price {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; color: var(--gold); text-align: right;
}
.ev-price .curr { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; color: var(--text-muted); display: block; }

.add-btn {
  padding: 8px 18px; background: var(--crimson); border: none; border-radius: 2px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
.add-btn:hover { background: var(--crimson-light); }
.add-btn:disabled { background: #1a3a1a; color: #7dcf7d; cursor: default; letter-spacing: 0.08em; }

.seats-left { font-size: 0.68rem; color: var(--text-muted); text-align: right; }
.seats-left.low { color: #e06060; }

/* EMPTY */
.empty-state { padding: 4rem; text-align: center; color: var(--text-muted); background: var(--card); }
.empty-state .big { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: rgba(255,255,255,0.08); margin-bottom: 6px; }

/* ===== CART SIDEBAR ===== */
.cart-col {
  position: sticky; top: 100px;
  background: var(--card); border: 1px solid var(--border-red);
  border-radius: 4px; overflow: hidden;
}

.cart-col::before {
  content: ''; display: block; height: 3px;
  background: linear-gradient(90deg, transparent, var(--crimson), transparent);
}

.cart-header {
  padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.cart-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 400; }
.cart-badge {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--crimson); display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 500;
}

.cart-items { padding: 1rem 1.5rem; max-height: 300px; overflow-y: auto; }
.cart-items:empty::after {
  content: 'Your cart is empty'; display: block;
  text-align: center; color: var(--text-muted); font-size: 0.85rem;
  padding: 2rem 0;
}

/* CART ITEM */
.cart-item {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 3px; padding: 10px 12px; margin-bottom: 8px;
  animation: fadeUp 0.3s ease both;
}
.ci-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.ci-name { font-size: 0.82rem; font-weight: 500; line-height: 1.3; }
.ci-price { font-size: 0.82rem; color: var(--gold); white-space: nowrap; font-family: 'Playfair Display', serif; }
.ci-seat input {
  width: 100%; padding: 7px 10px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
  letter-spacing: 0.1em; outline: none; transition: border-color 0.2s;
  text-transform: uppercase;
}
.ci-seat input:focus { border-color: var(--crimson); }
.ci-seat input::placeholder { text-transform: none; letter-spacing: 0; color: var(--text-muted); }
.ci-remove {
  margin-top: 6px; background: none; border: none;
  color: var(--text-muted); font-size: 0.7rem; cursor: pointer; padding: 0;
  transition: color 0.2s; letter-spacing: 0.1em; text-transform: uppercase;
}
.ci-remove:hover { color: #e05252; }

/* CART TOTAL */
.cart-total {
  padding: 1rem 1.5rem; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.cart-total .label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
.cart-total .amount { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); }

/* CHECKOUT FORM */
.checkout-form { padding: 0 1.5rem 1.5rem; }
.cf-label {
  font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-muted); display: block; margin-bottom: 5px;
}
.cf-input {
  width: 100%; padding: 9px 12px; margin-bottom: 10px;
  background: var(--card2); border: 1px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
  outline: none; transition: border-color 0.2s;
}
.cf-input:focus { border-color: var(--crimson); }

.checkout-btn {
  width: 100%; padding: 13px;
  background: var(--crimson); border: none; border-radius: 2px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
  font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s; margin-top: 4px;
}
.checkout-btn:hover { background: var(--crimson-light); }
.checkout-btn:disabled { background: #222; color: var(--text-muted); cursor: default; }

/* ===== SUCCESS MODAL ===== */
.success-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 3000; display: none; align-items: center; justify-content: center; padding: 2rem;
}
.success-overlay.open { display: flex; }

/* THE REALISTIC TICKET */
.real-ticket-wrap { display: flex; flex-direction: column; gap: 16px; max-height: 80vh; overflow-y: auto; padding: 4px; }

.real-ticket {
  width: 480px; max-width: 100%;
  background: #fff; border-radius: 6px;
  overflow: hidden; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(139,0,0,0.3);
  animation: ticketIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes ticketIn {
  from { opacity: 0; transform: scale(0.8) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* TICKET HEADER — dark crimson */
.rt-header {
  background: linear-gradient(135deg, #8b0000 0%, #5a0000 100%);
  padding: 18px 22px 16px;
  position: relative; overflow: hidden;
}
.rt-header::after {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.rt-brand { font-family: 'Playfair Display', serif; font-size: 1rem; color: rgba(255,255,255,0.9); letter-spacing: 0.08em; }
.rt-brand span { color: rgba(255,200,200,0.9); }
.rt-event-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #fff; margin-top: 4px; font-weight: 700; }
.rt-category {
  font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(255,255,255,0.55); margin-top: 3px;
}

/* TICKET BODY */
.rt-body {
  background: #fff; padding: 14px 22px;
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
}
.rt-field {}
.rt-field .rk { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 2px; }
.rt-field .rv { font-size: 0.88rem; color: #111; font-weight: 500; }
.rt-field .rv.big { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #8b0000; }

/* PERFORATION */
.rt-perf {
  position: relative; margin: 0;
  display: flex; align-items: center;
}
.rt-perf::before, .rt-perf::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--bg);
  top: 50%; transform: translateY(-50%);
  z-index: 2;
}
.rt-perf::before { left: -10px; }
.rt-perf::after  { right: -10px; }
.rt-perf-line {
  flex: 1;
  border-top: 2px dashed #ddd;
  margin: 0 18px;
}

/* TICKET STUB */
.rt-stub {
  background: #fafafa; padding: 12px 22px;
  display: flex; align-items: center; justify-content: space-between;
}
.rt-seat {
  background: #8b0000;
  padding: 8px 16px; border-radius: 3px;
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem; color: #fff; letter-spacing: 0.12em;
}
.rt-stub-info { text-align: right; }
.rt-stub-info .rk { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: #999; }
.rt-stub-info .rv { font-size: 0.82rem; color: #333; font-weight: 500; }

/* BARCODE */
.rt-barcode {
  background: #fff; padding: 10px 22px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.barcode-svg { display: flex; gap: 2px; align-items: flex-end; height: 36px; }
.barcode-svg span {
  background: #111; border-radius: 1px;
  animation: none;
}
.rt-barcode-num { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: #999; letter-spacing: 0.2em; }

/* MODAL CONTROLS */
.success-controls {
  display: flex; gap: 10px; justify-content: center; margin-top: 8px;
}
.sc-btn {
  padding: 10px 24px; border: none; border-radius: 2px;
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
}
.sc-btn.primary { background: var(--crimson); color: #fff; }
.sc-btn.primary:hover { background: var(--crimson-light); }
.sc-btn.ghost { background: rgba(255,255,255,0.07); color: var(--text-muted); }
.sc-btn.ghost:hover { background: rgba(255,255,255,0.12); }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; right: 2rem; padding: 12px 20px; border-radius: 3px;
  font-size: 0.85rem; z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #1a3a1a; border: 1px solid #2d6a2d; color: #7dcf7d; }
.toast.error   { background: #3a1a1a; border: 1px solid #6a2d2d; color: #cf7d7d; }

/* FLOATING CART (mobile) */
.floating-cart {
  display: none;
  position: fixed; bottom: 24px; right: 24px;
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--crimson); border: none; cursor: pointer;
  font-size: 1.4rem; z-index: 500;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(139,0,0,0.5);
}
.fc-badge {
  position: absolute; top: 2px; right: 2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--bg); font-size: 0.65rem;
  display: flex; align-items: center; justify-content: center;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 2px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 900px) {
  .page-wrap { grid-template-columns: 1fr; }
  .cart-col { display: none; }
  .floating-cart { display: flex; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-brand">Event<span>Sense</span></div>
  <div class="nav-links">
  <div class="search-box">
    <input id="searchInput" placeholder="Search events, actors…" oninput="filterEvents()">
  </div>
  <span id="navUsername" style="color:#c9a84c; font-size:0.85rem; margin-right:4px;"></span>
  <a href="login.html">Dashboard</a>
  <a href="#" onclick="doLogout()">Logout</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">Live Events & Experiences</div>
  <h1 class="hero-title">Explore Amazing <em>Events</em></h1>
  <p class="hero-sub">Choose your seat, secure your spot — unforgettable moments await</p>
</div>

<!-- PAGE WRAP -->
<div class="page-wrap">

  <!-- EVENTS LIST -->
  <div class="events-col">
    <div class="events-list" id="eventsContainer">
      <div class="empty-state"><div class="big">Loading…</div></div>
    </div>
  </div>

  <!-- CART SIDEBAR -->
  <div class="cart-col">
    <div class="cart-header">
      <div class="cart-title">Your Cart</div>
      <div class="cart-badge" id="cartBadge">0</div>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-total">
      <span class="label">Total</span>
      <span class="amount" id="totalPrice">0 MAD</span>
    </div>

    <div class="checkout-form">
      <label class="cf-label">Your Name</label>
      <input class="cf-input" id="username" placeholder="Full name">
      <label class="cf-label">Password</label>
      <input class="cf-input" type="password" id="password" placeholder="••••••••">
      <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Confirm Purchase</button>
    </div>
  </div>

</div>

<!-- FLOATING CART (mobile) -->
<button class="floating-cart" onclick="toggleMobileCart()">
  🛒
  <div class="fc-badge" id="fcBadge">0</div>
</button>

<!-- SUCCESS MODAL -->
<div class="success-overlay" id="successOverlay">
  <div style="display:flex; flex-direction:column; align-items:center; gap:20px; max-width:520px; width:100%;">
    <div style="text-align:center;">
      <div style="font-size:0.68rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--crimson); margin-bottom:6px;">Purchase Confirmed</div>
      <div style="font-family:'Playfair Display',serif; font-size:1.8rem;">Your <em style="color:var(--gold)">Tickets</em></div>
    </div>
    <div class="real-ticket-wrap" id="ticketDisplay"></div>
    <div class="success-controls">
      <button class="sc-btn primary" onclick="closeSuccess()">Done</button>
      <button class="sc-btn ghost" onclick="window.print()">Print</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API        = 'http://localhost:8091/rest/events';
const TICKET_API = 'http://localhost:8091/rest/tickets';



let events      = [];
let cart        = [];

// ✅ Read logged-in user from localStorage (set by login.html)
let currentUser = null;
const _stored = localStorage.getItem('user');
if (_stored) {
  currentUser = JSON.parse(_stored);
} else {
  // not logged in — redirect to login.html
  window.location.href = 'login.html?role=user';
}

// Show name in nav
window.addEventListener('DOMContentLoaded', () => {
  if (currentUser) {
    const el = document.getElementById('navUsername');
    if (el) el.textContent = currentUser.firstname;
  }
});

function doLogout() {
  localStorage.removeItem('user');
  localStorage.removeItem('eventsense_cart'); // clear cart on logout
  window.location.href = 'login.html?role=user';
}

/* ===== CART PERSISTENCE ===== */
function saveCart() {
  localStorage.setItem('eventsense_cart', JSON.stringify(cart));
}

function loadCart() {
  const saved = localStorage.getItem('eventsense_cart');
  if (saved) {
    cart = JSON.parse(saved);
  }
}

/* ===== LOAD ===== */
function loadEvents() {
  fetch(API + '/all')
    .then(r => r.json())
    .then(data => { 
      events = data; 
      renderEvents(); 
      // After events load, check for pending AI bookings
      processPendingBookings();
    })
    .catch(() => showToast('Could not load events', 'error'));
}

/* ===== PENDING BOOKINGS FROM AI PAGE ===== */
function processPendingBookings() {
  const pending = localStorage.getItem('eventsense_pending_bookings');
  if (!pending) return;
  
  const bookings = JSON.parse(pending);
  if (!bookings.length) return;
  
  let addedCount = 0;
  
  bookings.forEach(booking => {
    // Find the full event object from loaded events
    const event = events.find(e => e.id === booking.id);
    if (event && !cart.some(c => c.id === event.id)) {
      cart.push(event);
      addedCount++;
    } else if (!event) {
      // Event not found in current list, try to use the stored minimal data
      // This handles cases where the event might not be in the current page of results
      const minimalEvent = {
        id: booking.id,
        title: booking.title,
        price: booking.price,
        location: booking.location || '—',
        eventDate: booking.eventDate || null,
        category: booking.category || 'General',
        actors: booking.actors || '',
        availableSeats: booking.availableSeats || 0
      };
      if (!cart.some(c => c.id === minimalEvent.id)) {
        cart.push(minimalEvent);
        addedCount++;
      }
    }
  });
  
  if (addedCount > 0) {
    saveCart();
    updateCart();
    renderEvents();
    showToast(`${addedCount} event(s) added from AI recommendations`, 'success');
  }
  
  localStorage.removeItem('eventsense_pending_bookings');
}

function categoryIcon(cat) {
  if (!cat) return '🎟️';
  const c = cat.toLowerCase();
  if (c.includes('music') || c.includes('concert')) return '🎵';
  if (c.includes('sport')) return '⚽';
  if (c.includes('theatre')) return '🎭';
  if (c.includes('cinema') || c.includes('film')) return '🎬';
  if (c.includes('art')) return '🖼️';
  return '🎟️';
}

/* ===== RENDER ===== */
function renderEvents(list = events) {
  const container = document.getElementById('eventsContainer');
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="big">No events found</div></div>`;
    return;
  }
  container.innerHTML = list.map((e, i) => {
    const img = e.imageUrl;
    const inCart   = cart.some(c => c.id === e.id);
    const soldOut  = e.availableSeats === 0;
    const lowSeats = e.availableSeats > 0 && e.availableSeats <= 10;
    return `
    <div class="event-row" style="animation-delay:${i*0.05}s">
      <div class="ev-img">
        ${img ? `<img src="${img}" alt="${e.title}">` : `<div class="no-img">${categoryIcon(e.category)}</div>`}
      </div>
      <div class="perf"></div>
      <div class="ev-info">
        <div class="ev-title">${e.title}</div>
        <div class="ev-meta">
          <span class="ev-chip"><span class="ic">📍</span>${e.location || '—'}</span>
          <span class="ev-chip"><span class="ic">📅</span>${e.eventDate ? e.eventDate.substring(0,10) : '—'}</span>
          ${e.actors ? `<span class="ev-chip"><span class="ic">🎭</span>${e.actors}</span>` : ''}
        </div>
        ${e.category ? `<span class="ev-tag">${e.category}</span>` : ''}
      </div>
      <div class="ev-right">
        <div class="ev-price">${e.price}<span class="curr">MAD</span></div>
        ${soldOut
          ? `<button class="add-btn" disabled>Sold Out</button>`
          : inCart
            ? `<button class="add-btn" disabled>✓ Added</button>`
            : `<button class="add-btn" onclick="addToCart(${e.id})">Add to Cart</button>`}
        ${lowSeats ? `<div class="seats-left low">Only ${e.availableSeats} left!</div>` : ''}
        ${!soldOut && e.availableSeats > 10 ? `<div class="seats-left">${e.availableSeats} seats</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ===== SEARCH ===== */
function filterEvents() {
  const v = document.getElementById('searchInput').value.toLowerCase();
  renderEvents(events.filter(e =>
    (e.title||'').toLowerCase().includes(v) ||
    (e.category||'').toLowerCase().includes(v) ||
    (e.location||'').toLowerCase().includes(v) ||
    (e.actors||'').toLowerCase().includes(v)
  ));
}

/* ===== CART ===== */
function addToCart(id) {
  const e = events.find(x => x.id === id);
  if (!e) return;
  cart.push(e);
  saveCart(); // ✅ persist cart
  updateCart();
  renderEvents();
  showToast(`"${e.title}" added to cart`, 'success');
}

function removeItem(i) {
  cart.splice(i, 1);
  saveCart(); // ✅ persist cart
  updateCart();
  renderEvents();
}

function updateCart() {
  const count = cart.length;
  document.getElementById('cartBadge').textContent = count;
  document.getElementById('fcBadge').textContent   = count;

  const box = document.getElementById('cartItems');
  let total = 0;
  box.innerHTML = '';

  cart.forEach((c, i) => {
    total += c.price;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="ci-top">
        <div class="ci-name">${c.title}</div>
        <div class="ci-price">${c.price} MAD</div>
      </div>
      <div class="ci-seat">
        <input id="seat-${i}" placeholder="Enter seat number (e.g. A12)" maxlength="6">
      </div>
      <button class="ci-remove" onclick="removeItem(${i})">✕ Remove</button>`;
    box.appendChild(div);
  });

  document.getElementById('totalPrice').textContent = total + ' MAD';
  document.getElementById('checkoutBtn').disabled   = count === 0;

  // ✅ pre-fill name from logged-in user
  if (currentUser) {
    const unInput = document.getElementById('username');
    if (unInput && !unInput.value) {
      unInput.value = currentUser.firstname + (currentUser.lastname ? ' ' + currentUser.lastname : '');
    }
  }
}

function toggleMobileCart() {
  document.querySelector('.cart-col').scrollIntoView({ behavior: 'smooth' });
}

/* ===== CHECKOUT ===== */
async function checkout() {
  if (!currentUser) {
    showToast('Please log in first', 'error');
    setTimeout(() => window.location.href = 'user.html', 1500);
    return;
  }

  const username = document.getElementById('username').value.trim()
                   || (currentUser.firstname + ' ' + (currentUser.lastname || '')).trim();

  if (!cart.length) { showToast('Your cart is empty', 'error'); return; }

  const btn = document.getElementById('checkoutBtn');
  btn.disabled    = true;
  btn.textContent = 'Processing…';

  const purchased = [];

  for (let i = 0; i < cart.length; i++) {
    const item = cart[i];
    const seat = (document.getElementById(`seat-${i}`)?.value?.trim().toUpperCase())
                 || ('A' + Math.floor(Math.random() * 100));

    const year   = new Date().getFullYear();
    const qrCode = `QR-${year}-EVT${item.id}-USER${username.toUpperCase().replace(/\s+/g,'')}-${seat}`;

    const ticketData = {
      eventId:    item.id,
      userId:     currentUser.id,   // ✅ real user ID
      userName:   username,
      seatNumber: seat,
      status:     'PAID',
      pricePaid:  item.price,
      qrCode:     qrCode
    };

    try {
      const res = await fetch(`${TICKET_API}/create?requesterId=${currentUser.id}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(ticketData)
      });

      if (!res.ok) {
        const errText = await res.text();
        console.error('Create failed:', errText);
        showToast(`Failed: ${errText}`, 'error');
        continue;
      }

      const saved = await res.json();
      purchased.push({ ticket: saved, event: item, seat, qrCode });

    } catch(err) {
      console.error(err);
      showToast(`Error booking "${item.title}"`, 'error');
    }
  }

  if (purchased.length) {
    showTickets(purchased, username);
    cart = [];
    saveCart(); // ✅ clear persisted cart
    updateCart();
    renderEvents();
    localStorage.setItem('refreshTickets', Date.now());
  }

  btn.disabled    = false;
  btn.textContent = 'Confirm Purchase';
}

/* ===== SHOW REALISTIC TICKETS ===== */
function showTickets(purchased, username) {
  const wrap = document.getElementById('ticketDisplay');
  wrap.innerHTML = '';

  purchased.forEach(({ ticket, event, seat, qrCode }, idx) => {
    const ticketId = ticket?.id || (Math.floor(Math.random() * 90000) + 10000);
    const barcode  = generateBarcode();
    const dateStr  = event.eventDate
      ? new Date(event.eventDate).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
      : '—';
    const timeStr  = event.eventDate
      ? new Date(event.eventDate).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })
      : '—';

    const div = document.createElement('div');
    div.className = 'real-ticket';
    div.style.animationDelay = (idx * 0.15) + 's';
    div.innerHTML = `
      <div class="rt-header">
        <div class="rt-brand">Event<span>Sense</span></div>
        <div class="rt-event-name">${event.title}</div>
        <div class="rt-category">${event.category || 'General'}</div>
      </div>
      <div class="rt-body">
        <div class="rt-field"><div class="rk">Date</div><div class="rv">${dateStr}</div></div>
        <div class="rt-field"><div class="rk">Time</div><div class="rv">${timeStr}</div></div>
        <div class="rt-field"><div class="rk">Price Paid</div><div class="rv big">${event.price} MAD</div></div>
        <div class="rt-field"><div class="rk">Location</div><div class="rv">${event.location || '—'}</div></div>
        <div class="rt-field"><div class="rk">Holder</div><div class="rv">${username}</div></div>
        <div class="rt-field"><div class="rk">Status</div><div class="rv" style="color:#2d8a2d;font-weight:600;">✓ PAID</div></div>
      </div>
      <div class="rt-perf"><div class="rt-perf-line"></div></div>
      <div class="rt-stub">
        <div class="rt-seat">${seat}</div>
        <div class="rt-stub-info">
          <div class="rk">Ticket ID</div>
          <div class="rv">#${String(ticketId).padStart(6,'0')}</div>
        </div>
      </div>
      <div class="rt-barcode">
        <div class="barcode-svg">${barcode}</div>
        <div class="rt-barcode-num">${qrCode}</div>
      </div>`;
    wrap.appendChild(div);
  });

  document.getElementById('successOverlay').classList.add('open');
}

function generateBarcode() {
  const widths = [1,2,3,1,2,1,3,2,1,1,2,3,1,2,1,3,1,2,2,1,3,1,2,1,1,3,2,1,2,3,1,1,2,1,3,2,1,2,1,3];
  return widths.map(w => {
    const h = 20 + Math.floor(Math.random() * 16);
    return `<span style="width:${w}px;height:${h}px;background:#111;border-radius:1px;display:inline-block;"></span>`;
  }).join('');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('open');
}

/* ===== TOAST ===== */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ===== INIT ===== */
loadCart();     // ✅ load persisted cart first
updateCart();
loadEvents();
</script>
