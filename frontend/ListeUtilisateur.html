<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EventSense | Gestion Utilisateurs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --crimson: #8b0000;
  --crimson-light: #a00000;
  --crimson-dim: rgba(139,0,0,0.15);
  --crimson-glow: rgba(139,0,0,0.4);
  --bg: #05080f;
  --bg2: #0b1220;
  --card: #0c1018;
  --card2: #111827;
  --border: rgba(255,255,255,0.07);
  --border-red: rgba(139,0,0,0.35);
  --text: #f0ede8;
  --text-muted: #6a7a8a;
  --gold: #c9a84c;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(139,0,0,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 100%, rgba(139,0,0,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed; top: 0; width: 100%; padding: 18px 40px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
  z-index: 1000; border-bottom: 1px solid rgba(139,0,0,0.2);
}
nav h1 { font-size: 1.8rem; font-weight: 700; font-family: 'Playfair Display', serif; letter-spacing: 0.04em; }
nav h1 span { color: var(--crimson); }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-links a { color: #ccc; margin-left: 25px; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
.nav-links a:hover { color: var(--crimson); }
.admin-badge {
  background: rgba(139,0,0,0.2); color: var(--crimson);
  padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
  margin-left: 25px;
}
.nav-logout {
  background: none; border: none; color: #ccc; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  margin-left: 20px; transition: color 0.2s;
}
.nav-logout:hover { color: var(--crimson); }

/* ===== LOGIN ===== */
#loginScreen {
  position: fixed; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: var(--bg); z-index: 500;
}
.login-box {
  width: 420px; padding: 3rem;
  background: var(--card); border: 1px solid var(--border-red);
  border-radius: 4px; position: relative; overflow: hidden;
}
.login-box::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--crimson), transparent);
}
.login-logo { text-align: center; margin-bottom: 2.5rem; }
.login-logo .brand { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 0.1em; }
.login-logo .brand span { color: var(--crimson); }
.login-logo .sub { font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
.login-field { margin-bottom: 1.2rem; }
.login-field label { display: block; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.login-field input {
  width: 100%; padding: 12px 16px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
  outline: none; transition: border-color 0.2s;
}
.login-field input:focus { border-color: var(--crimson); }
.login-btn {
  width: 100%; padding: 13px; margin-top: 0.5rem;
  background: var(--crimson); border: none; border-radius: 3px;
  color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; transition: background 0.2s;
}
.login-btn:hover { background: var(--crimson-light); }
.login-error { margin-top: 1rem; text-align: center; font-size: 0.82rem; color: #e05252; min-height: 20px; }

/* ===== MAIN ===== */
#app { display: none; position: relative; z-index: 1; }

.main {
  padding: 110px 5% 80px;
  max-width: 1440px; margin: 0 auto;
}

/* PAGE HEADER */
.page-header {
  display: flex; align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 3rem; padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}
.page-eyebrow { font-size: 0.68rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--crimson); margin-bottom: 8px; }
.page-title { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; line-height: 1; letter-spacing: -0.01em; }
.page-title em { font-style: italic; color: var(--gold); }

.header-right { display: flex; align-items: center; gap: 2rem; }

.stat-strip { display: flex; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.stat-cell { padding: 10px 20px; background: var(--card); text-align: center; min-width: 80px; }
.stat-cell .n { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text); }
.stat-cell .l { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

.add-btn {
  padding: 11px 22px; background: var(--crimson); border: none; border-radius: 3px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
  letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
.add-btn:hover { background: var(--crimson-light); }

/* CONTROLS */
.controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
.search-wrap { flex: 1; max-width: 480px; position: relative; }
.search-wrap input {
  width: 100%; padding: 10px 16px 10px 42px;
  background: var(--card); border: 1px solid var(--border); border-radius: 3px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--crimson); }
.search-wrap::before {
  content: '⌕'; position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; pointer-events: none;
}

/* ===== USER CARDS GRID ===== */
.users-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 2px; background: var(--border);
  border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
}

/* THE CARD */
.user-card {
  background: var(--card);
  position: relative; overflow: hidden;
  transition: background 0.25s;
  animation: fadeUp 0.4s ease both;
}
.user-card:hover { background: #0f1825; }

/* Left crimson accent */
.user-card::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--crimson);
  transform: scaleY(0); transform-origin: bottom;
  transition: transform 0.3s ease;
}
.user-card:hover::before { transform: scaleY(1); }

/* CARD TOP BAND — colored gradient per initials */
.card-band {
  height: 80px; position: relative;
  background: linear-gradient(135deg, #0a0f1a 0%, #12071a 100%);
  display: flex; align-items: flex-end;
  padding: 0 1.5rem 0;
  border-bottom: 1px solid var(--border);
}

.card-band::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--crimson-dim);
  opacity: 0; transition: opacity 0.25s;
}
.user-card:hover .card-band::before { opacity: 1; }

/* Avatar overlapping band and body */
.avatar-wrap {
  position: absolute;
  bottom: -22px; left: 1.5rem;
  z-index: 2;
}
.avatar {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: var(--card2);
  border: 2px solid var(--border-red);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; color: #e06060;
}

/* Role badge inside band */
.role-tag {
  margin-left: auto;
  margin-bottom: 12px;
  font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 2px;
  background: var(--crimson-dim); color: #e06060;
  border: 1px solid var(--border-red);
}

/* CARD BODY */
.card-body {
  padding: 1.8rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
}

.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; font-weight: 400; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-id-line {
  font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 1rem;
}

.card-meta {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.info-chip {
  display: flex; align-items: flex-start; gap: 5px; font-size: 0.78rem;
}
.info-chip .ic { font-size: 0.82rem; margin-top: 1px; flex-shrink: 0; }
.info-chip .ik { color: var(--text-muted); display: block; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }
.info-chip .iv { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.info-chip .iv.empty { color: rgba(255,255,255,0.15); font-style: italic; }

/* BUDGET BAR */
.budget-wrap {
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
.budget-label {
  display: flex; justify-content: space-between;
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 5px;
}
.budget-label .bval { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 0.85rem; }
.budget-track { height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.budget-fill { height: 100%; background: var(--crimson); border-radius: 2px; transition: width 0.4s ease; }

/* CARD FOOTER */
.card-footer {
  padding: 0.9rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
}
.card-birthday { font-size: 0.75rem; color: var(--text-muted); }
.card-birthday strong { color: var(--text); font-weight: 500; }
.card-actions { display: flex; gap: 6px; }
.act-btn {
  width: 32px; height: 32px; border: 1px solid var(--border);
  background: none; border-radius: 2px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
}
.act-btn:hover { border-color: var(--crimson); color: #e06060; }
.act-btn.del:hover { border-color: #e05252; color: #e05252; }

/* EMPTY */
.empty-state { grid-column: 1 / -1; padding: 5rem; text-align: center; color: var(--text-muted); }
.empty-state .big { font-family: 'Playfair Display', serif; font-size: 2rem; color: rgba(255,255,255,0.08); margin-bottom: 8px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 2000; display: none;
  align-items: center; justify-content: center; padding: 2rem;
}
.modal-overlay.open { display: flex; }
.modal {
  width: 680px; max-width: 100%; max-height: 90vh; overflow-y: auto;
  background: var(--card); border: 1px solid var(--border-red); border-radius: 4px; position: relative;
}
.modal::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--crimson), transparent);
}
.modal-header {
  padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 400; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; line-height: 1; transition: color 0.2s; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 1.5rem 2rem 1rem; }
.form-section {
  font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--crimson); margin: 1.2rem 0 0.8rem; padding-bottom: 6px;
  border-bottom: 1px solid var(--border-red);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label { font-size: 0.67rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
.form-field input {
  padding: 10px 12px; background: var(--card2); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.form-field input:focus { border-color: var(--crimson); }
.modal-footer {
  padding: 1.2rem 2rem; border-top: 1px solid var(--border);
  display: flex; gap: 0.75rem; justify-content: flex-end;
  position: sticky; bottom: 0; background: var(--card); z-index: 1;
}
.btn-cancel {
  padding: 9px 18px; background: none; border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
.btn-save {
  padding: 9px 22px; background: var(--crimson); border: none; border-radius: 3px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  font-weight: 500; cursor: pointer; transition: background 0.2s;
}
.btn-save:hover { background: var(--crimson-light); }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  padding: 12px 20px; border-radius: 3px; font-size: 0.85rem; z-index: 9999;
  opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #1a3a1a; border: 1px solid #2d6a2d; color: #7dcf7d; }
.toast.error { background: #3a1a1a; border: 1px solid #6a2d2d; color: #cf7d7d; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 2px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <h1>Event<span>Sense</span></h1>
  <div class="nav-links">
    <a href="page.html">Accueil</a>
    <span class="admin-badge">ADMIN</span>
    <button class="nav-logout" onclick="doLogout()">Déconnexion</button>
  </div>
</nav>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">Event<span>Sense</span></div>
      <div class="sub">Espace Admin</div>
    </div>
    <div class="login-field">
      <label>Admin ID</label>
      <input type="number" id="loginId" placeholder="Entrez votre ID" min="1">
    </div>
    <button class="login-btn" onclick="doLogin()">Accéder au tableau de bord</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="main">

    <div class="page-header">
      <div class="page-title-block">
        <div class="page-eyebrow">Gestion Admin</div>
        <div class="page-title">Les <em>Utilisateurs</em></div>
      </div>
      <div class="header-right">
        <div class="stat-strip">
          <div class="stat-cell">
            <div class="n" id="statTotal">—</div>
            <div class="l">Total</div>
          </div>
          <div class="stat-cell">
            <div class="n" id="statBudget">—</div>
            <div class="l">Avec budget</div>
          </div>
          <div class="stat-cell">
            <div class="n" id="statCats">—</div>
            <div class="l">Catégories</div>
          </div>
        </div>
        <button class="add-btn" onclick="openModal()">Ajouter</button>
      </div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Rechercher par nom, catégorie, ville…" oninput="filterCards()">
      </div>
    </div>

    <div class="users-grid" id="usersGrid">
      <div class="empty-state"><div class="big">Chargement…</div></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Ajouter un Utilisateur</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mId">

      <div class="form-section">Identité</div>
      <div class="form-grid">
        <div class="form-field"><label>Prénom</label><input type="text" id="mFirstname" placeholder="Prénom"></div>
        <div class="form-field"><label>Nom</label><input type="text" id="mLastname" placeholder="Nom"></div>
        <div class="form-field"><label>Date de Naissance</label><input type="date" id="mBirthday"></div>
        <div class="form-field"><label>Mot de Passe</label><input type="password" id="mPassword" placeholder="••••••••"></div>
      </div>

      <div class="form-section">Préférences</div>
      <div class="form-grid">
        <div class="form-field"><label>Catégories Préférées</label><input type="text" id="mCategories" placeholder="Musique, Sport…"></div>
        <div class="form-field"><label>Villes Préférées</label><input type="text" id="mLocations" placeholder="Casablanca, Rabat…"></div>
        <div class="form-field"><label>Budget Max (MAD)</label><input type="number" id="mBudget" placeholder="500"></div>
        <div class="form-field"><label>Acteurs / Artistes</label><input type="text" id="mActors" placeholder="Nom artiste…"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveUser()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8091/rest/person';
let adminId  = null;
let allUsers = [];

/* ===== LOGIN ===== */
function doLogin() {
  const id = parseInt(document.getElementById('loginId').value);
  if (!id) { loginErr('Veuillez entrer un ID'); return; }

  fetch(`${API}/info/${id}`)
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(person => {
      if (person.role !== 'ROLE_ADMIN') { loginErr('Accès refusé — admins uniquement'); return; }
      adminId = id;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadUsers();
    })
    .catch(() => loginErr('ID invalide ou serveur non disponible'));
}

function loginErr(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

document.getElementById('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  if (confirm('Se déconnecter ?')) window.location.href = 'page.html';
}

/* ===== LOAD ===== */
function loadUsers() {
  fetch(`${API}/users?requesterId=${adminId}`)
    .then(r => r.json())
    .then(data => {
      allUsers = data;
      updateStats(data);
      renderCards(data);
    })
    .catch(() => showToast('Erreur de chargement', 'error'));
}

function updateStats(data) {
  document.getElementById('statTotal').textContent  = data.length;
  document.getElementById('statBudget').textContent = data.filter(u => u.budgetMax).length;
  const cats = new Set(data.map(u => u.preferredCategories).filter(Boolean));
  document.getElementById('statCats').textContent   = cats.size;
}

/* ===== FILTER ===== */
function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.firstname||'').toLowerCase().includes(q) ||
    (u.lastname||'').toLowerCase().includes(q) ||
    (u.preferredCategories||'').toLowerCase().includes(q) ||
    (u.preferredLocations||'').toLowerCase().includes(q)
  );
  renderCards(filtered);
}

/* ===== RENDER ===== */
function initials(u) {
  return ((u.firstname||'?')[0] + (u.lastname||'?')[0]).toUpperCase();
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function budgetPct(u) {
  const max = 5000;
  return u.budgetMax ? Math.min(Math.round((u.budgetMax / max) * 100), 100) : 0;
}

function renderCards(users) {
  const grid = document.getElementById('usersGrid');
  if (!users.length) {
    grid.innerHTML = `<div class="empty-state"><div class="big">Aucun utilisateur</div><p>Créez le premier utilisateur</p></div>`;
    return;
  }

  grid.innerHTML = users.map((u, i) => `
    <div class="user-card" style="animation-delay:${i * 0.05}s">

      <div class="card-band">
        <div class="avatar-wrap">
          <div class="avatar">${initials(u)}</div>
        </div>
        <div class="role-tag">${u.role === 'ROLE_ADMIN' ? 'Admin' : 'User'}</div>
      </div>

      <div class="card-body">
        <div class="card-name">${u.firstname || ''} ${u.lastname || ''}</div>
        <div class="card-id-line"># ${u.id}</div>
        <div class="card-meta">
          <div class="info-chip">
            <span class="ic">🗂</span>
            <div>
              <span class="ik">Catégories</span>
              <span class="iv ${!u.preferredCategories ? 'empty' : ''}">${u.preferredCategories || '—'}</span>
            </div>
          </div>
          <div class="info-chip">
            <span class="ic">📍</span>
            <div>
              <span class="ik">Villes</span>
              <span class="iv ${!u.preferredLocations ? 'empty' : ''}">${u.preferredLocations || '—'}</span>
            </div>
          </div>
          <div class="info-chip">
            <span class="ic">🎭</span>
            <div>
              <span class="ik">Artistes</span>
              <span class="iv ${!u.preferredActors ? 'empty' : ''}">${u.preferredActors || '—'}</span>
            </div>
          </div>
          <div class="info-chip">
            <span class="ic">🎂</span>
            <div>
              <span class="ik">Naissance</span>
              <span class="iv">${formatDate(u.birthdaydate)}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="budget-wrap">
        <div class="budget-label">
          <span>Budget Max</span>
          <span class="bval">${u.budgetMax ? u.budgetMax + ' MAD' : '—'}</span>
        </div>
        <div class="budget-track">
          <div class="budget-fill" style="width:${budgetPct(u)}%"></div>
        </div>
      </div>

      <div class="card-footer">
        <div class="card-birthday">
          <strong>#${u.id}</strong>
        </div>
        <div class="card-actions">
          <button class="act-btn" onclick='openModal(${JSON.stringify(u).replace(/'/g, "&apos;")})' title="Modifier">✎</button>
          <button class="act-btn del" onclick="deleteUser(${u.id})" title="Supprimer">✕</button>
        </div>
      </div>

    </div>
  `).join('');
}

/* ===== MODAL ===== */
function openModal(user = null) {
  document.getElementById('modalTitle').textContent = user ? 'Modifier Utilisateur' : 'Ajouter un Utilisateur';
  document.getElementById('mId').value         = user ? user.id : '';
  document.getElementById('mFirstname').value  = user ? user.firstname || '' : '';
  document.getElementById('mLastname').value   = user ? user.lastname || '' : '';
  document.getElementById('mBirthday').value   = user ? user.birthdaydate || '' : '';
  document.getElementById('mPassword').value   = '';
  document.getElementById('mCategories').value = user ? user.preferredCategories || '' : '';
  document.getElementById('mLocations').value  = user ? user.preferredLocations || '' : '';
  document.getElementById('mBudget').value     = user ? user.budgetMax || '' : '';
  document.getElementById('mActors').value     = user ? user.preferredActors || '' : '';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

/* ===== SAVE ===== */
function saveUser() {
  const id = document.getElementById('mId').value;
  const data = {
    firstname:           document.getElementById('mFirstname').value,
    lastname:            document.getElementById('mLastname').value,
    birthdaydate:        document.getElementById('mBirthday').value || null,
    password:            document.getElementById('mPassword').value,
    preferredCategories: document.getElementById('mCategories').value,
    preferredLocations:  document.getElementById('mLocations').value,
    budgetMax:           document.getElementById('mBudget').value ? parseInt(document.getElementById('mBudget').value) : null,
    preferredActors:     document.getElementById('mActors').value
  };

  const url    = id ? `${API}/update/${id}?requesterId=${adminId}` : `${API}/create?requesterId=${adminId}`;
  const method = id ? 'PUT' : 'POST';

  fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(() => {
      showToast(id ? 'Utilisateur modifié' : 'Utilisateur créé', 'success');
      closeModal();
      loadUsers();
    })
    .catch(() => showToast('Erreur lors de la sauvegarde', 'error'));
}

/* ===== DELETE ===== */
function deleteUser(id) {
  if (!confirm('Supprimer cet utilisateur ?')) return;
  fetch(`${API}/delete/${id}?requesterId=${adminId}`, { method: 'DELETE' })
    .then(r => { if (!r.ok) throw new Error(); })
    .then(() => { showToast('Utilisateur supprimé', 'success'); loadUsers(); })
    .catch(() => showToast('Erreur de suppression', 'error'));
}

/* ===== TOAST ===== */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
